name = "portfolio-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
    { pattern = "portfolio-worker.onurd.com.tr", zone_name = "onurd.com.tr" },
]

[vars]
FRONTEND_URL = "https://onurd.com.tr"

# Secrets (set via `wrangler secret put`):
# DATABASE_URL   — NeonDB connection string
# JWT_SECRET     — random 64+ char secret key
# REFRESH_TOKEN_SECRET — random 64+ char secret key
